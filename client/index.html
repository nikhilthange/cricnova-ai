<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="theme-color" content="#09090b" />
    
    <!-- Primary Meta Tags -->
    <title>CricNova - The Future of Live Cricket Scores & AI Analytics</title>
    <meta name="title" content="CricNova - The Future of Live Cricket Scores & AI Analytics" />
    <meta name="description" content="Experience cricket like never before. CricNova offers real-time live scores, predictive AI insights, advanced statistical charts, and deep player analytics." />

    <meta name="author" content="CricNova" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://cricnova-ai.vercel.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cricnova-ai.vercel.app/" />
    <meta property="og:title" content="CricNova - Live Cricket Scores & AI Analytics" />
    <meta property="og:description" content="Get real-time live scores, predictive AI insights, advanced statistical charts, and deep player analytics." />

    <!-- Fonts and Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- JSON-LD Structured Data for AEO/GEO (AI Chatbots & Search Engines) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://cricnova-ai.vercel.app/#website",
          "url": "https://cricnova-ai.vercel.app/",
          "name": "CricNova",
          "description": "The ultimate platform for live cricket scores and AI-powered analytics.",
          "publisher": {
            "@id": "https://cricnova-ai.vercel.app/#organization"
          },
          "potentialAction": [{
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://cricnova-ai.vercel.app/players?search={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }]
        },
        {
          "@type": "Organization",
          "@id": "https://cricnova-ai.vercel.app/#organization",
          "name": "CricNova AI",
          "url": "https://cricnova-ai.vercel.app/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://cricnova-ai.vercel.app/favicon.svg"
          },
          "sameAs": [
            "https://twitter.com/cricnova"
          ]
        }
      ]
    }
    </script>
  </head>

    <div id="root"></div>
