version: '3.8'

services:
  cricnova-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - cricnova-server
    environment:
      - VITE_API_URL=http://localhost:5000

  cricnova-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/cricnova
      - JWT_SECRET=supersecret123
      - CLIENT_URL=http://localhost
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
